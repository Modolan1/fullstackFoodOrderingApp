services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongo-db:27017/food-delivery
    ports:
      - "4000:4000"
    depends_on:
      - mongo-db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:4000
    ports:
      - "5173:4173"
    depends_on:
      - backend

  admin:
    build:
      context: ./admin/admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:4000
    ports:
      - "5174:4173"
    depends_on:
      - backend

  mongo-db:
    image: mongo:latest
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:

